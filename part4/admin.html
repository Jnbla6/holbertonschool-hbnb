<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HBNB Admin Dashboard — Manage users, places, and amenities.">
    <title>Admin Dashboard &mdash; HBNB</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-page { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
        .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
        .admin-header h1 { font-size: 1.8rem; font-weight: 700; }
        .admin-header .admin-badge { background: linear-gradient(135deg, #FF385C, #E31C5F); color: #fff; padding: 0.3rem 0.9rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }

        .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2.5rem; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.3rem; text-align: center; }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary, #FF385C); }
        .stat-card .stat-label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.3rem; }

        .admin-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .admin-section h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }

        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th { text-align: left; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; padding: 0.7rem 0.8rem; border-bottom: 2px solid var(--border); }
        .admin-table td { padding: 0.7rem 0.8rem; border-bottom: 1px solid var(--border-light, var(--border)); font-size: 0.9rem; vertical-align: middle; }
        .admin-table tr:last-child td { border-bottom: none; }
        .admin-table tr:hover td { background: var(--bg-hover, rgba(0,0,0,0.02)); }

        .badge-admin { background: #FF385C; color: #fff; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
        .badge-user { background: var(--border); color: var(--text-secondary); padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }

        .btn-sm { padding: 0.3rem 0.7rem; border: none; border-radius: 6px; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-promote { background: #00A699; color: #fff; }
        .btn-promote:hover { background: #008a80; }
        .btn-demote { background: #FC642D; color: #fff; }
        .btn-demote:hover { background: #e05520; }
        .btn-delete { background: #FF385C; color: #fff; }
        .btn-delete:hover { background: #E31C5F; }
        .btn-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

        .amenity-form { display: flex; gap: 0.7rem; margin-bottom: 1rem; align-items: center; }
        .amenity-form input[type="text"] { flex: 1; padding: 0.6rem 0.8rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--bg); color: var(--text); }
        .amenity-form .icon-input { width: 3.5rem; text-align: center; font-size: 1.3rem; padding: 0.4rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); }
        .amenity-form button { padding: 0.6rem 1.2rem; background: var(--primary, #FF385C); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; white-space: nowrap; }

        .amenity-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .amenity-tag { background: var(--bg-hover, rgba(0,0,0,0.04)); border: 1px solid var(--border); padding: 0.35rem 0.8rem; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem; }
        .amenity-tag .delete-amenity { background: none; border: none; color: #FF385C; cursor: pointer; font-size: 1rem; line-height: 1; padding: 0; }

        @media (max-width: 700px) {
            .admin-table { font-size: 0.82rem; }
            .admin-table th, .admin-table td { padding: 0.5rem 0.4rem; }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="header-inner">
            <a href="index.html" aria-label="HBNB Home">
                <img src="images/logo.png" alt="HBNB Logo" class="logo">
            </a>
            <nav aria-label="Main navigation">
                <a href="index.html">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:2px;"><polyline points="15 18 9 12 15 6"/></svg>
                    Back to Home
                </a>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark/light mode">
                    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
            </nav>
        </div>
    </header>

    <div class="admin-page">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <span class="admin-badge">⚙ Administrator</span>
        </div>

        <!-- Stats -->
        <div class="admin-stats">
            <div class="stat-card">
                <div class="stat-value" id="stat-users">-</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-places">-</div>
                <div class="stat-label">Total Places</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-amenities">-</div>
                <div class="stat-label">Amenities</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-reviews">-</div>
                <div class="stat-label">Reviews</div>
            </div>
        </div>

        <!-- Users -->
        <div class="admin-section">
            <h2>👥 User Management</h2>
            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-users-table">
                        <tr><td colspan="4" style="text-align:center; color:var(--text-secondary);">Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Amenities -->
        <div class="admin-section">
            <h2>🏷 Amenity Management</h2>
            <div class="amenity-form" id="amenity-form">
                <input type="text" class="icon-input" id="new-amenity-icon" placeholder="🏊" maxlength="2" title="Pick an emoji icon">
                <input type="text" id="new-amenity-name" placeholder="Add new amenity (e.g. Swimming Pool)">
                <button id="add-amenity-btn">+ Add</button>
            </div>
            <div class="amenity-tags" id="amenity-list">
                <span style="color:var(--text-secondary); font-size:0.9rem;">Loading...</span>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-inner">
            <div class="footer-bottom">
                <p class="footer-copyright">&copy; 2024 HBNB, Inc. &middot; All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="scripts.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Check if user is admin
        if (localStorage.getItem('is_admin') !== 'true') {
            alert('Access denied. Admin privileges required.');
            window.location.href = 'index.html';
            return;
        }

        const token = document.cookie.split('; ').find(r => r.startsWith('token='))?.split('=')[1];
        if (!token) {
            window.location.href = 'login.html';
            return;
        }

        const API = 'http://127.0.0.1:8080/api/v1';
        const headers = { 'Authorization': `Bearer ${token}` };

        // ======= LOAD STATS =======
        async function loadStats() {
            try {
                const [usersRes, placesRes, amenitiesRes, reviewsRes] = await Promise.all([
                    fetch(`${API}/users/`),
                    fetch(`${API}/places/`),
                    fetch(`${API}/amenities/`),
                    fetch(`${API}/reviews/`)
                ]);
                const users = await usersRes.json();
                const places = await placesRes.json();
                const amenities = await amenitiesRes.json();
                const reviews = await reviewsRes.json();

                document.getElementById('stat-users').textContent = users.length;
                document.getElementById('stat-places').textContent = places.length;
                document.getElementById('stat-amenities').textContent = amenities.length;
                document.getElementById('stat-reviews').textContent = reviews.length;
            } catch (e) { console.error(e); }
        }

        // ======= LOAD USERS =======
        async function loadUsers() {
            try {
                const res = await fetch(`${API}/users/`);
                const users = await res.json();
                const tbody = document.getElementById('admin-users-table');
                tbody.innerHTML = '';

                users.forEach(user => {
                    const tr = document.createElement('tr');
                    const isAdmin = user.is_admin;
                    tr.innerHTML = `
                        <td><strong>${user.first_name} ${user.last_name}</strong></td>
                        <td>${user.email}</td>
                        <td><span class="${isAdmin ? 'badge-admin' : 'badge-user'}">${isAdmin ? 'Admin' : 'User'}</span></td>
                        <td>
                            <div class="btn-actions">
                                <button class="btn-sm ${isAdmin ? 'btn-demote' : 'btn-promote'}" data-toggle-id="${user.id}">
                                    ${isAdmin ? 'Demote' : 'Promote'}
                                </button>
                                <button class="btn-sm btn-delete" data-delete-id="${user.id}" data-name="${user.first_name} ${user.last_name}">Delete</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                // Toggle admin
                tbody.querySelectorAll('[data-toggle-id]').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const userId = btn.dataset.toggleId;
                        const res = await fetch(`${API}/users/${userId}/toggle-admin`, {
                            method: 'PUT',
                            headers: { ...headers, 'Content-Type': 'application/json' }
                        });
                        if (res.ok) {
                            loadUsers();
                            loadStats();
                        } else {
                            const err = await res.json();
                            alert(err.error || 'Failed');
                        }
                    });
                });

                // Delete user
                tbody.querySelectorAll('[data-delete-id]').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const userId = btn.dataset.deleteId;
                        const name = btn.dataset.name;
                        if (!confirm(`Delete user "${name}"? All their places and reviews will also be removed.`)) return;
                        const res = await fetch(`${API}/users/${userId}`, {
                            method: 'DELETE',
                            headers
                        });
                        if (res.ok) {
                            loadUsers();
                            loadStats();
                        } else {
                            const err = await res.json();
                            alert(err.error || 'Failed to delete user');
                        }
                    });
                });

            } catch (e) { console.error(e); }
        }

        // ======= LOAD AMENITIES =======
        async function loadAmenities() {
            try {
                const res = await fetch(`${API}/amenities/`);
                const amenities = await res.json();
                const container = document.getElementById('amenity-list');
                container.innerHTML = '';

                amenities.forEach(am => {
                    const tag = document.createElement('div');
                    tag.className = 'amenity-tag';
                    tag.innerHTML = `<span style="font-size:1.1rem;">${am.icon || '✓'}</span> <span>${am.name}</span><button class="delete-amenity" data-id="${am.id}" title="Delete">&times;</button>`;
                    container.appendChild(tag);
                });

                if (!amenities.length) {
                    container.innerHTML = '<span style="color:var(--text-secondary)">No amenities yet. Add one above!</span>';
                }

                // Delete amenity buttons
                container.querySelectorAll('.delete-amenity').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        if (!confirm('Delete this amenity?')) return;
                        const res = await fetch(`${API}/amenities/${btn.dataset.id}`, {
                            method: 'DELETE',
                            headers
                        });
                        if (res.ok) {
                            loadAmenities();
                            loadStats();
                        } else {
                            alert('Failed to delete amenity');
                        }
                    });
                });
            } catch (e) { console.error(e); }
        }

        // Add amenity
        document.getElementById('add-amenity-btn').addEventListener('click', async () => {
            const iconInput = document.getElementById('new-amenity-icon');
            const input = document.getElementById('new-amenity-name');
            const name = input.value.trim();
            const icon = iconInput.value.trim() || '✓';
            if (!name) return;
            try {
                const res = await fetch(`${API}/amenities/`, {
                    method: 'POST',
                    headers: { ...headers, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, icon })
                });
                if (res.ok) {
                    input.value = '';
                    iconInput.value = '';
                    loadAmenities();
                    loadStats();
                } else {
                    const err = await res.json();
                    alert(err.error || 'Failed to add amenity');
                }
            } catch (e) { alert('Network error'); }
        });

        // Init
        loadStats();
        loadUsers();
        loadAmenities();
    });
    </script>
</body>
</html>
