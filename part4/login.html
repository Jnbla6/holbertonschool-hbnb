<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to HBNB to access exclusive deals, manage your bookings, and write reviews.">
    <title>Login &mdash; HBNB</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="header-inner">
            <a href="index.html" aria-label="HBNB Home">
                <img src="images/logo.png" alt="HBNB Logo" class="logo">
            </a>
            <nav aria-label="Main navigation">
                <a href="index.html">Explore</a>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark/light mode">
                    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
            </nav>
        </div>
    </header>

    <!-- ===== LOGIN ===== -->
    <div class="login-page">
        <div class="login-container">
            <div class="login-logo-wrap">
                <img src="images/logo.png" alt="HBNB Logo">
            </div>

            <div class="login-card">
                <form id="login-form" novalidate>
                    <h2>Welcome back</h2>
                    <p class="login-subtitle">Sign in to continue your adventure</p>

                    <div class="login-form-fields">
                        <div class="form-group">
                            <label for="email">Email address</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="you@example.com"
                                required
                                autocomplete="email"
                            >
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Enter your password"
                                required
                                autocomplete="current-password"
                            >
                        </div>

                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <label style="display:flex; align-items:center; gap:0.4rem; font-size:0.82rem; cursor:pointer;">
                                <input
                                    type="checkbox"
                                    id="remember-me"
                                    name="remember"
                                    style="width:auto; padding:0; background:none; border:1px solid var(--border); border-radius:3px; accent-color:var(--primary);"
                                >
                                Remember me
                            </label>
                            <a href="#" style="font-size:0.82rem; color:var(--primary); font-weight:600; text-decoration:underline; text-underline-offset:2px;">Forgot password?</a>
                        </div>

                        <button type="submit" class="submit-btn" id="login-submit-btn" style="width:100%; padding:0.9rem; font-size:0.95rem; border-radius:8px; margin-top:0.25rem;">
                            Sign in
                        </button>
                    </div>

                    <div class="login-divider">or</div>

                    <div class="social-login-grid">
                        <button type="button" class="social-btn" id="google-login-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                            Google
                        </button>
                        <button type="button" class="social-btn" id="github-login-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                            GitHub
                        </button>
                    </div>
                </form>
            </div>

            <p class="login-footer">
                Don't have an account? <a href="#">Sign up free</a>
            </p>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
