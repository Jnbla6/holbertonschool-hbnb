<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Add a new place to HBNB.">
    <title>Add a Place &mdash; HBNB</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Inline styles for form layout -->
    <style>
        .place-form-fields {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .place-form-row {
            display: flex;
            gap: 1rem;
        }
        .place-form-row > .form-group {
            flex: 1;
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="header-inner">
            <a href="index.html" aria-label="HBNB Home">
                <img src="images/logo.png" alt="HBNB Logo" class="logo">
            </a>
            <nav aria-label="Main navigation">
                <a href="index.html">Explore</a>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark/light mode">
                    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
            </nav>
        </div>
    </header>

    <!-- ===== ADD PLACE ===== -->
    <div class="login-page">
        <div class="login-container" style="max-width: 600px;">
            <div class="login-card">
                <form id="add-place-form" novalidate>
                    <h2>Host a new place</h2>
                    <p class="login-subtitle">Fill out the details below to list your property</p>

                    <div class="place-form-fields">
                        <div class="form-group">
                            <label for="title">Title</label>
                            <input type="text" id="title" name="title" placeholder="Beautiful apartment" required>
                        </div>

                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" name="description" placeholder="Describe your place..." required style="width: 100%; min-height: 100px; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.95rem;"></textarea>
                        </div>

                        <div class="place-form-row">
                            <div class="form-group">
                                <label for="price">Price per night ($)</label>
                                <input type="number" id="price" name="price" placeholder="100" min="1" step="1" required>
                            </div>
                            <div class="form-group">
                                <label for="max_guests">Max Capacity</label>
                                <input type="number" id="max_guests" name="max_guests" placeholder="4" min="1" required>
                            </div>
                        </div>

                        <div class="place-form-row">
                            <div class="form-group">
                                <label for="number_rooms">Bedrooms</label>
                                <input type="number" id="number_rooms" name="number_rooms" placeholder="2" min="1" required>
                            </div>
                            <div class="form-group">
                                <label for="number_bathrooms">Bathrooms</label>
                                <input type="number" id="number_bathrooms" name="number_bathrooms" placeholder="1" min="1" required>
                            </div>
                        </div>

                        <div class="place-form-row">
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" name="city" placeholder="e.g. Riyadh" required>
                            </div>
                            <div class="form-group">
                                <label for="country">Country</label>
                                <input type="text" id="country" name="country" placeholder="e.g. Saudi Arabia" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Location (Click on map to pick)</label>
                            <div id="picker-map" style="height: 300px; width: 100%; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 0.5rem; z-index: 1;"></div>
                        </div>

                        <div class="place-form-row" style="opacity: 0.7;">
                            <div class="form-group">
                                <label for="latitude">Latitude</label>
                                <input type="number" id="latitude" name="latitude" placeholder="e.g. 24.7136" step="any" required readonly style="background: var(--bg-hover);">
                            </div>

                            <div class="form-group">
                                <label for="longitude">Longitude</label>
                                <input type="number" id="longitude" name="longitude" placeholder="e.g. 46.6753" step="any" required readonly style="background: var(--bg-hover);">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Amenities</label>
                            <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                                <select id="amenity-select" style="flex: 1; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); font-family: inherit; font-size: 0.95rem;">
                                    <option value="" disabled selected>Select an amenity</option>
                                </select>
                                <button type="button" id="add-amenity-btn" style="padding: 0.5rem 1.5rem; border-radius: 8px; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold;">Add</button>
                            </div>
                            <div id="amenities-container" style="display: flex; flex-wrap: wrap; gap: 0.5rem; border: 1px solid var(--border); padding: 1rem; border-radius: 8px; min-height: 50px; background: var(--bg);">
                                <span style="color: var(--text-secondary); font-size: 0.9rem;" id="am-empty-state">Loading amenities...</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="image_url">Image</label>
                            <input type="file" id="image_url" name="image_file" accept="image/*" style="padding: 0.5rem; border: 1px dashed var(--border); background: var(--bg); border-radius: 8px; cursor: pointer;">
                        </div>

                        <button type="submit" class="submit-btn" id="add-place-submit-btn" style="width:100%; padding:0.9rem; font-size:0.95rem; border-radius:8px; margin-top:1rem;">
                            Submit Listing
                        </button>
                    </div>
                </form>
            </div>
            
            <div style="text-align: center; margin-top: 1rem;">
                <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">&larr; Back to Home</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/add_place.js"></script>
</body>
</html>
